# Prometheus configuration for ByteFreezer Proxy monitoring
global:
  scrape_interval: 15s # Set the scrape interval to every 15 seconds. Default is every 1 minute.
  evaluation_interval: 15s # Evaluate rules every 15 seconds. The default is every 1 minute.

# Alertmanager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # - alertmanager:9093

# Load rules once and periodically evaluate them according to the global 'evaluation_interval'.
rule_files:
  - "bytefreezer_proxy_rules.yml"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # ByteFreezer Proxy instances
  - job_name: 'bytefreezer-proxy'
    static_configs:
      - targets: ['localhost:9099']  # Default proxy metrics port
    metrics_path: /metrics
    scrape_interval: 15s
    scrape_timeout: 10s
    scheme: http
    
    # Add service discovery for multiple instances
    # file_sd_configs:
    #   - files:
    #     - "targets/bytefreezer-proxy-*.json"
    #     refresh_interval: 10s

  # Example: Multiple ByteFreezer Proxy instances
