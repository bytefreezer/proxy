app:
  name: bytefreezer-proxy
  version: 0.0.3

# Logging configuration
logging:
  level: debug
  encoding: console

# API server configuration
server:
  api_port: 8099

# Plugin-based input configuration
inputs:
  # HTTP Plugin for JSON data
  - type: "http"
    name: "http-json"
    config:
      host: "0.0.0.0"
      port: 8095
      path: "/webhook"
      dataset_id: "json-data"
      data_hint: "json"
      max_payload_size: 1048576
      max_lines_per_request: 1000
      read_timeout: 30
      write_timeout: 30
      enable_authentication: false

  # HTTP Plugin for NDJSON data
  - type: "http"
    name: "http-ndjson"
    config:
      host: "0.0.0.0"
      port: 8096
      path: "/webhook"
      dataset_id: "ndjson-data"
      data_hint: "ndjson"
      max_payload_size: 1048576
      max_lines_per_request: 1000
      read_timeout: 30
      write_timeout: 30
      enable_authentication: false

  # UDP Plugin for JSON data
  - type: "udp"
    name: "udp-json"
    config:
      host: "0.0.0.0"
      port: 8097
      dataset_id: "udp-json-data"
      data_hint: "json"
      read_buffer_size: 65536
      worker_count: 2
      protocol: "udp"

  # UDP Plugin for raw data
  - type: "udp"
    name: "udp-raw"
    config:
      host: "0.0.0.0"
      port: 8098
      dataset_id: "udp-raw-data"
      data_hint: "raw"
      read_buffer_size: 65536
      worker_count: 2
      protocol: "udp"

# Global tenant configuration
tenant_id: "test-tenant"
bearer_token: "comprehensive-test-token"

# Bytefreezer-receiver configuration
receiver:
  base_url: "http://localhost:8082/{tenantid}/{datasetid}"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

# Batch processing configuration
batching:
  enabled: true
  max_lines: 100
  max_bytes: 1048576  # 1MB
  timeout_seconds: 10
  compression_enabled: true
  compression_level: 6

# SOC alerting configuration
soc:
  enabled: false
  endpoint: ""
  timeout: 30

# OpenTelemetry configuration (disabled by default)
otel:
  enabled: false
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 60

# Local spooling for failed uploads
spooling:
  enabled: true
  directory: "/tmp/test-all-plugins-spool"
  max_size_bytes: 1073741824  # 1GB
  retry_attempts: 3
  retry_interval_seconds: 30
  cleanup_interval_seconds: 300

# Development mode
dev: false