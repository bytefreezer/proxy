apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: bytefreezer-proxy
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: proxy
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bytefreezer-proxy
      app.kubernetes.io/component: proxy
  podMetricsEndpoints:
  - port: metrics
    interval: 15s
    path: /metrics
    scheme: http
  namespaceSelector:
    matchNames:
    - bytefreezer