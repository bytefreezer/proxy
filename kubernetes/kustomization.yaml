apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: bytefreezer-proxy
  namespace: bytefreezer

resources:
  - namespace.yaml
  - configmap.yaml
  - persistent-volume.yaml
  - deployment.yaml
  - service.yaml
  - networkpolicy.yaml
  # Prometheus monitoring (uncomment if using Prometheus Operator)
  # - servicemonitor.yaml
  # - podmonitor.yaml

commonLabels:
  app.kubernetes.io/name: bytefreezer-proxy
  app.kubernetes.io/part-of: bytefreezer

images:
  - name: ghcr.io/n0needt0/bytefreezer-proxy
    newTag: latest

replicas:
  - name: bytefreezer-proxy
    count: 1