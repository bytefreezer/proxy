apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bytefreezer-proxy-netpol
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: security
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: bytefreezer-proxy
      app.kubernetes.io/component: proxy
  policyTypes:
  - Ingress
  - Egress
  ingress:
  # Allow UDP traffic on data collection ports
  - from: []  # Allow from any source - restrict in production
    ports:
    - protocol: UDP
      port: 2056
    - protocol: UDP
      port: 2057
    - protocol: UDP
      port: 2058
  # Allow health check traffic
  - from:
    - namespaceSelector: {}  # Allow from any namespace for health checks
    ports:
    - protocol: TCP
      port: 8088
  egress:
  # Allow DNS resolution
  - to: []
    ports:
    - protocol: UDP
      port: 53
    - protocol: TCP
      port: 53
  # Allow communication to receiver service
  - to:
    - namespaceSelector:
        matchLabels:
          name: bytefreezer
    - podSelector:
        matchLabels:
          app.kubernetes.io/name: bytefreezer-receiver
    ports:
    - protocol: TCP
      port: 8080
  # Allow HTTPS for external SOC alerts (if enabled)
  - to: []
    ports:
    - protocol: TCP
      port: 443