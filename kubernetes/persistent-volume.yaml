apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bytefreezer-proxy-spool-pvc
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: storage
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
  storageClassName: ""  # Use default storage class
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bytefreezer-proxy-logs-pvc
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: logging
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: ""  # Use default storage class