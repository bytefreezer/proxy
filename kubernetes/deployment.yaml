apiVersion: apps/v1
kind: Deployment
metadata:
  name: bytefreezer-proxy
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: proxy
    app.kubernetes.io/version: "latest"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: bytefreezer-proxy
      app.kubernetes.io/component: proxy
  template:
    metadata:
      labels:
        app.kubernetes.io/name: bytefreezer-proxy
        app.kubernetes.io/component: proxy
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - name: bytefreezer-proxy
        image: ghcr.io/n0needt0/bytefreezer-proxy:latest
        imagePullPolicy: Always
        args:
          - "--config"
          - "/etc/bytefreezer-proxy/config.yaml"
        ports:
        - containerPort: 8088
          name: health
          protocol: TCP
        - containerPort: 9090
          name: metrics
          protocol: TCP
        - containerPort: 2056
          name: udp-2056
          protocol: UDP
        - containerPort: 2057
          name: udp-2057
          protocol: UDP
        - containerPort: 2058
          name: udp-2058
          protocol: UDP
        env:
        - name: CONFIG_FILE
          value: "/etc/bytefreezer-proxy/config.yaml"
        - name: POD_NAME
          valueFrom:
            fieldRef:
              fieldPath: metadata.name
        - name: POD_NAMESPACE
          valueFrom:
            fieldRef:
              fieldPath: metadata.namespace
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 8088
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 5
          failureThreshold: 2
        volumeMounts:
        - name: config
          mountPath: /etc/bytefreezer-proxy
          readOnly: true
        - name: spool-storage
          mountPath: /var/spool/bytefreezer-proxy
        - name: log-storage
          mountPath: /var/log/bytefreezer-proxy
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL
      volumes:
      - name: config
        configMap:
          name: bytefreezer-proxy-config
      - name: spool-storage
        persistentVolumeClaim:
          claimName: bytefreezer-proxy-spool-pvc
      - name: log-storage
        persistentVolumeClaim:
          claimName: bytefreezer-proxy-logs-pvc
      restartPolicy: Always