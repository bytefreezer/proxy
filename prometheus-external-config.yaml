# Prometheus Configuration for External ByteFreezer Proxy Hosts
# Add this to your Prometheus ConfigMap or values.yaml in your K3s cluster

global:
  scrape_interval: 15s
  external_labels:
    cluster: 'k3s-cluster'

scrape_configs:
  # Your existing Kubernetes scrape configs...
  
  # External ByteFreezer Proxy hosts
  - job_name: 'bytefreezer-proxy-external'
    static_configs:
      # Replace with your actual proxy host IPs/hostnames
      - targets:
          - '192.168.1.100:9090'    # Proxy host 1
          - '192.168.1.101:9090'    # Proxy host 2 
          - '192.168.1.102:9090'    # Proxy host 3
          # Add more proxy hosts as needed
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    
    # Optional: Add labels to identify external proxies
    relabel_configs:
      - target_label: 'service'
        replacement: 'bytefreezer-proxy'
      - target_label: 'environment' 
        replacement: 'production'
      - source_labels: ['__address__']
        regex: '([^:]+):.*'
        target_label: 'proxy_host'
        replacement: '${1}'

  # Alternative: Service Discovery via DNS (if you have DNS entries)
  # - job_name: 'bytefreezer-proxy-dns'
  #   dns_sd_configs:
  #     - names:
  #         - 'proxy1.example.com'
  #         - 'proxy2.example.com'
  #       type: 'A'
  #       port: 9090
  #   metrics_path: '/metrics'

  # Alternative: File-based service discovery (for dynamic hosts)  
  # - job_name: 'bytefreezer-proxy-file'
  #   file_sd_configs:
  #     - files:
  #         - '/etc/prometheus/targets/bytefreezer-proxy.json'
  #       refresh_interval: 30s