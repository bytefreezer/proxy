app:
  name: bytefreezer-proxy-keepsrc-test
  version: 0.0.2

# Logging configuration
logging:
  level: debug
  encoding: console

# API server configuration
server:
  api_port: 8089

# Plugin-based input configuration
inputs:
  # Test HTTP with NDJSON data hint
  - type: "http"
    name: "http-ndjson-test"
    config:
      host: "0.0.0.0"
      port: 8090
      tenant_id: "test"
      dataset_id: "ndjson_data"
      data_hint: "ndjson"

# Global tenant configuration (used as fallback for plugins)
tenant_id: "test"
bearer_token: "test-token"

# Bytefreezer-receiver configuration (point to mock receiver)
receiver:
  base_url: "http://localhost:9091/{tenantid}/{datasetid}"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

# Batch processing configuration
batching:
  enabled: true
  max_lines: 0          # Max lines per batch (0 = disabled)
  max_bytes: 1048576    # Max bytes per batch - 1MB for quick testing
  timeout_seconds: 10   # Short timeout for quick testing
  compression_enabled: true
  compression_level: 6

# SOC alerting configuration (disabled)
soc:
  enabled: false

# OpenTelemetry configuration (disabled)
otel:
  enabled: false

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 60

# Spooling configuration
spooling:
  enabled: true
  directory: "test-keepsrc-spool"
  max_size_bytes: 1073741824  # 1GB
  retry_attempts: 3
  retry_interval_seconds: 10
  cleanup_interval_seconds: 30
  keep_src: true
  queue_processing_interval_seconds: 20

# Development mode
dev: false