app:
  name: bytefreezer-proxy-extension-test
  version: 0.0.2

# Logging configuration
logging:
  level: debug
  encoding: console

# API server configuration
server:
  api_port: 8088

# Plugin-based input configuration
inputs:
  # Test HTTP with NDJSON data hint
  - type: "http"
    name: "http-ndjson-test"
    config:
      host: "0.0.0.0"
      port: 8080
      tenant_id: "test"
      dataset_id: "ndjson_data"
      data_hint: "ndjson"

  # Test HTTP with CSV data hint
  - type: "http"
    name: "http-csv-test"
    config:
      host: "0.0.0.0"
      port: 8081
      tenant_id: "test"
      dataset_id: "csv_data"
      data_hint: "csv"

  # Test HTTP with syslog data hint
  - type: "http"
    name: "http-syslog-test"
    config:
      host: "0.0.0.0"
      port: 8082
      tenant_id: "test"
      dataset_id: "syslog_data"
      data_hint: "syslog"

# Global tenant configuration (used as fallback for plugins)
tenant_id: "test"
bearer_token: "test-token"

# Bytefreezer-receiver configuration (disabled for this test)
receiver:
  base_url: "http://localhost:8082/{tenantid}/{datasetid}"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

# Batch processing configuration
batching:
  enabled: false

# SOC alerting configuration (disabled)
soc:
  enabled: false

# OpenTelemetry configuration (disabled)
telemetry:
  enabled: false

# Spooling configuration
spooling:
  enabled: true
  directory: "test-extensions-spool"
  batch_timer: 5
  batch_processors: 1
  retry_timer: 10
  retry_max_attempts: 3
  retry_processors: 1
  keep_src: true