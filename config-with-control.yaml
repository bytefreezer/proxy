app:
  name: bytefreezer-proxy
  version: 0.0.2

logging:
  level: info
  encoding: console

server:
  api_port: 8088

# No inputs for testing - just API and health reporting
inputs: []

# Account-based configuration (polls all tenants + datasets for account)
account_id: "ejq73vgnw26p"
bearer_token: "test-token"
control_url: "http://192.168.86.103:8082"
config_mode: "control-only"  # local-only | control-only

# Configuration polling from Control
config_polling:
  enabled: true
  interval_seconds: 60  # Poll every 60 seconds
  timeout_seconds: 30
  cache_directory: "/var/cache/bytefreezer-proxy"
  retry_on_error: true

receiver:
  base_url: "http://localhost:8081/{tenantid}/{datasetid}"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

batching:
  enabled: false

soc:
  enabled: false

otel:
  enabled: false

housekeeping:
  enabled: false

spooling:
  enabled: true
  directory: "/tmp/bytefreezer-proxy-spool"
  max_size_bytes: 1073741824
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300
  keep_src: false

dev: false

health_reporting:
  enabled: true
  report_interval: 30
  timeout_seconds: 10
  register_on_startup: true

tenant_validation:
  enabled: false
