# ByteFreezer Proxy Configuration — AWX/Ansible deployment
#
# This file contains AWX placeholder values for systemd/Ansible deployments.
# Ansible replaces REPLACE_WITH_AWX_VARIABLE_* at deploy time.
# For Docker deployments, use config.yaml instead.

app:
  name: bytefreezer-proxy
  version: 1.0.0

logging:
  level: info
  encoding: console

server:
  api_port: 8008

inputs: []

account_id: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_account_id"
bearer_token: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_proxy_bearer_token"
control_url: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_control_url"
config_mode: "control-only"

config_polling:
  enabled: true
  interval_seconds: 60
  timeout_seconds: 30
  cache_directory: "/var/cache/bytefreezer-proxy"
  retry_on_error: true

receiver:
  base_url: "REPLACE_WITH_AWX_VARIABLE_bytefreezer_receiver_url"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

batching:
  enabled: true
  max_lines: 0
  max_bytes: 10485760
  timeout_seconds: 60
  compression_enabled: true
  compression_level: 6

soc:
  enabled: false
  endpoint: ""
  timeout_seconds: 30

otel:
  enabled: false
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15
  metrics_port: 9090

spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 1073741824
  dlq_max_size_bytes: 10737418240
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300
  keep_src: false

dev: false

health_reporting:
  enabled: true
  report_interval: 30
  timeout_seconds: 10
  register_on_startup: true

tenant_validation:
  enabled: true
  cache_ttl_seconds: 300
  inactive_cache_ttl_seconds: 3600
  timeout_seconds: 5

error_tracking:
  enabled: true
