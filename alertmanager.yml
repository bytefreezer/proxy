# AlertManager configuration for ByteFreezer Proxy
global:
  smtp_smarthost: 'localhost:587'
  smtp_from: 'alertmanager@example.com'
  smtp_auth_username: 'alertmanager@example.com'
  smtp_auth_password: 'password'

# Route alerts based on labels
route:
  group_by: ['alertname', 'service']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'web.hook'
  routes:
    # Critical alerts go to pager
    - match:
        severity: critical
      receiver: critical-alerts
      group_wait: 5s
      repeat_interval: 30m

    # Warning alerts go to email
    - match:
        severity: warning
      receiver: warning-alerts
      repeat_interval: 2h

# Alert receivers
receivers:
  - name: 'web.hook'
    webhook_configs:
      - url: 'http://127.0.0.1:5001/'

  - name: 'critical-alerts'
    # Email notifications
    email_configs:
      - to: 'ops-critical@example.com'
        subject: 'CRITICAL: ByteFreezer Proxy Alert - {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          
          Summary: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          
          Description: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          
          Instance: {{ range .Alerts }}{{ .Labels.instance }}{{ end }}
          
          Time: {{ range .Alerts }}{{ .StartsAt }}{{ end }}
        
    # Slack notifications (uncomment and configure)
    # slack_configs:
    #   - api_url: 'YOUR_SLACK_WEBHOOK_URL'
    #     channel: '#ops-alerts'
    #     title: 'CRITICAL: ByteFreezer Proxy Alert'
    #     text: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'
    
    # PagerDuty notifications (uncomment and configure)  
    # pagerduty_configs:
    #   - routing_key: 'YOUR_PAGERDUTY_INTEGRATION_KEY'
    #     description: '{{ range .Alerts }}{{ .Annotations.summary }}{{ end }}'

  - name: 'warning-alerts'
    email_configs:
      - to: 'ops-warning@example.com'
        subject: 'WARNING: ByteFreezer Proxy Alert - {{ .GroupLabels.alertname }}'
        body: |
          Alert: {{ .GroupLabels.alertname }}
          
          Summary: {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          
          Description: {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
          
          Instance: {{ range .Alerts }}{{ .Labels.instance }}{{ end }}
          
          Time: {{ range .Alerts }}{{ .StartsAt }}{{ end }}

# Inhibition rules (silence certain alerts when others are firing)
inhibit_rules:
  # Silence warning alerts if critical alert is firing for same service
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'instance']