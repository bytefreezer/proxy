# ==============================================================================
# AWX GROUP VARIABLES FOR BYTEFREEZER PROXY
# ==============================================================================
#
# Copy these YAML blocks into your AWX inventory group variables.
# Navigate to: AWX → Inventories → Your Inventory → Groups → Variables
#
# The group_vars/ directory in this repo is for CLI usage only.
# For AWX, set variables directly in the AWX UI using these templates.
# ==============================================================================

# ==============================================================================
# MANAGED GROUP VARIABLES
# ==============================================================================
#
# Group Name: managed (or whatever you call it in AWX)
# Hosts: tp1 (192.168.86.101)
#
# Paste this into: AWX → Inventories → Your Inventory → Groups → managed → Variables
#
---
# ByteFreezer Proxy - Managed Deployment Variables
# Managed deployment on tp1, tp2, tp3

# Service configuration
service:
  name: "bytefreezer-proxy"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-proxy"
  config_dir: "/etc/bytefreezer-proxy"
  config_path: "/etc/bytefreezer-proxy/config.yaml"
  log_dir: "/var/log/bytefreezer-proxy"
  spool_dir: "/var/spool/bytefreezer-proxy"
  service_path: "/etc/systemd/system/bytefreezer-proxy.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-proxy"

# Application configuration (MANAGED-SPECIFIC)
config:
  app:
    name: "bytefreezer-proxy"
    version: "0.0.2"

  logging:
    level: "info"
    encoding: "console"

  server:
    api_port: 8008

  inputs: []

  # MANAGED ACCOUNT CONFIGURATION
  account_id: "ejq73vgnw26p"                                    # Managed account
  bearer_token: "-6O9pIT7fVrIr715CIwIUgZuBkY7lB5sRYHx"          # Managed account API key
  control_url: "http://192.168.86.103:8082"                     # Control on tp3
  config_mode: "control-only"

  config_polling:
    enabled: true
    interval_seconds: 60
    timeout_seconds: 30
    cache_directory: "/var/cache/bytefreezer-proxy"
    retry_on_error: true

  # MANAGED RECEIVER (tp2)
  receiver:
    base_url: "http://192.168.86.102:8080/{tenantid}/{datasetid}"  # Receiver webhook on tp2
    timeout_seconds: 30
    upload_worker_count: 5
    max_idle_conns: 10
    max_conns_per_host: 6

  batching:
    enabled: true
    max_lines: 0
    max_bytes: 10485760
    timeout_seconds: 60
    compression_enabled: true
    compression_level: 6

  soc:
    enabled: false
    endpoint: ""
    timeout_seconds: 30

  otel:
    enabled: false
    service_name: "bytefreezer-proxy"
    scrapeIntervalseconds: 15

  housekeeping:
    enabled: true
    intervalseconds: 60

  spooling:
    enabled: true
    directory: "{{ paths.spool_dir }}"
    max_size_bytes: 1073741824
    retry_attempts: 5
    retry_interval_seconds: 60
    cleanup_interval_seconds: 300
    keep_src: false

  health_reporting:
    enabled: true
    report_interval: 30
    timeout_seconds: 10
    register_on_startup: true

  tenant_validation:
    enabled: true
    cache_ttl_seconds: 300
    inactive_cache_ttl_seconds: 3600
    timeout_seconds: 5

  dev: false

# ==============================================================================
# END OF MANAGED GROUP VARIABLES
# ==============================================================================


