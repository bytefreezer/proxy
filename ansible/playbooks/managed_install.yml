---
- name: Install and configure ByteFreezer Proxy service (Managed)
  hosts: all
  become: yes
  vars_files:
    - vars/managed.yml

  pre_tasks:
    - name: Check if service already exists
      ansible.builtin.stat:
        path: "{{ paths.service_path }}"
      register: service_exists

    - name: Display update mode
      debug:
        msg: "Existing installation found - removing before reinstall"
      when: service_exists.stat.exists

    - name: Stop and disable existing service
      ansible.builtin.shell: |
        systemctl stop {{ service.name }} || true
        systemctl disable {{ service.name }} || true
      when: service_exists.stat.exists
      ignore_errors: yes

    - name: Remove existing systemd service file
      ansible.builtin.file:
        path: "{{ paths.service_path }}"
        state: absent
      when: service_exists.stat.exists

    - name: Remove existing binary
      ansible.builtin.file:
        path: "{{ paths.binary_path }}"
        state: absent
      when: service_exists.stat.exists

    - name: Remove existing configuration
      ansible.builtin.file:
        path: "{{ paths.config_dir }}"
        state: absent
      when: service_exists.stat.exists

    - name: Remove existing logrotate config
      ansible.builtin.file:
        path: "{{ paths.logrotate_path }}"
        state: absent
      when: service_exists.stat.exists

    - name: Reload systemd after removal
      ansible.builtin.systemd:
        daemon_reload: yes
      when: service_exists.stat.exists

  tasks:
      
    - name: Copy binary to destination
      ansible.builtin.copy:
        src: "{{ playbook_dir }}/dist/bytefreezer-proxy"
        dest: "{{ paths.binary_path }}"
        owner: root
        group: root
        mode: '0755'
 
    - name: Ensure config directory exists
      ansible.builtin.file:
        path: "{{ paths.config_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'

    - name: Ensure log directory exists
      ansible.builtin.file:
        path: "{{ paths.log_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      
    - name: Ensure spooling directory exists
      ansible.builtin.file:
        path: "{{ paths.spool_dir }}"
        state: directory
        owner: root
        group: root
        mode: '0755'
      
    - name: Generate configuration file
      ansible.builtin.template:
        src: templates/config.yaml.j2
        dest: "{{ paths.config_path }}"
        owner: root
        group: root
        mode: '0644'
      
    - name: Install logrotate configuration
      ansible.builtin.template:
        src: templates/logrotate.j2
        dest: "{{ paths.logrotate_path }}"
        owner: root
        group: root
        mode: '0644'
      
    - name: Create systemd service file
      ansible.builtin.template:
        src: templates/bytefreezer-proxy.service.j2
        dest: "{{ paths.service_path }}"
        owner: root
        group: root
        mode: '0644'

    - name: Enable and start service
      ansible.builtin.systemd:
        name: "{{ service.name }}"
        enabled: yes
        state: started
        daemon_reload: yes

  post_tasks:
    - name: Display installation status
      debug:
        msg:
          - "ByteFreezer Proxy installation completed!"
          - "Binary: {{ paths.binary_path }}"
          - "Config: {{ paths.config_path }}"
          - "Logs: {{ paths.log_dir }}"
          - "Spooling: {{ paths.spool_dir }}"
          - "Service: systemctl status {{ service.name }}"