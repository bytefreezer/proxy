---
# ByteFreezer Proxy - Centralized Variables Configuration

# GitHub repository
github_repo: "n0needt0/bytefreezer-proxy"
version: "{{ bytefreezer_proxy_version | default('latest') }}"

# Service configuration
service:
  name: "bytefreezer-proxy"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-proxy" 
  config_dir: "/etc/bytefreezer-proxy"
  config_path: "/etc/bytefreezer-proxy/config.yaml"
  log_dir: "/var/log/bytefreezer-proxy"
  spool_dir: "/var/spool/bytefreezer-proxy"
  service_path: "/etc/systemd/system/bytefreezer-proxy.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-proxy" 

# Log rotation settings
logrotate:
  rotate_count: 7

# Application configuration
config:
  app:
    name: "bytefreezer-proxy"
    version: "0.0.1"
  
  logging:
    level: "info"
    encoding: "console"
  
  server:
    api_port: 8088
  
  # Plugin-based input configuration
  inputs:
    # UDP Plugin for eBPF data on port 2056 (standard)
    - type: "udp"
      name: "ebpf-udp-listener"
      config:
        host: "0.0.0.0"
        port: 2056
        dataset_id: "ebpf-data"
        protocol: "udp"
        read_buffer_size: 65536
        worker_count: 4
    
    # Optional: Additional plugins (uncomment as needed)
    # - type: "udp"
    #   name: "syslog-udp-listener"
    #   config:
    #     host: "0.0.0.0"
    #     port: 2057
    #     dataset_id: "syslog-data"
    #     protocol: "syslog"
    #     syslog_mode: "rfc3164"
    #
    # - type: "http"
    #   name: "webhook-endpoint"
    #   config:
    #     host: "0.0.0.0"
    #     port: 8081
    #     path: "/webhook"
    #     dataset_id: "webhook-data"
    #     max_payload_size: 10485760
    #     max_lines_per_request: 1000
    #     enable_authentication: true
  
  # Global tenant configuration
  tenant_id: "customer-1"
  bearer_token: "eb4ba9e3236eaefae736495bd79f0d6de753bd7b6547b184ac0c439ff76982cf"

  receiver:
    base_url: "http://192.168.86.102:8082/{tenantid}/{datasetid}"
    timeout_seconds: 30
    retry_count: 3
    retry_delay_seconds: 1
  
  soc:
    enabled: false
    endpoint: ""
    timeout: 30
  
  otel:
    enabled: false  # Disabled by default (enable for monitoring)
    service_name: "bytefreezer-proxy"
    scrapeIntervalseconds: 15
    # Prometheus mode - expose metrics on HTTP endpoint for scraping
    prometheus_mode: true
    metrics_port: 9090
    # Bind to all interfaces for external scraping
    metrics_host: "0.0.0.0"
  
  housekeeping:
    enabled: true
    intervalseconds: 60
  
  spooling:
    enabled: true
    directory: "{{ paths.spool_dir }}"
    max_size_bytes: 1073741824  # 1GB
    retry_attempts: 5
    retry_interval_seconds: 60
    cleanup_interval_seconds: 300
  
  dev: false

# Download configuration for install.yml
download:
  url: "https://github.com/{{ github_repo }}/releases/{{ 'latest/download' if version == 'latest' else 'download/' + version }}/bytefreezer-proxy-linux-amd64.tar.gz"

# Docker image configuration for docker_install.yml
docker:
  image_name: "ghcr.io/n0needt0/bytefreezer-proxy"
  tag: "{{ bytefreezer_proxy_version | default('latest') }}"
  force_pull: false  # Set to true to always pull latest image

# Remove configuration
remove:
  spooling_dir: "{{ bytefreezer_proxy_remove_spooling_dir | default(false) }}"