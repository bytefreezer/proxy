---
# ByteFreezer Proxy - Centralized Variables Configuration

# GitHub repository
github_repo: "n0needt0/bytefreezer-proxy"
version: "{{ bytefreezer_proxy_version | default('latest') }}"

# Service configuration
service:
  name: "bytefreezer-proxy"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-proxy" 
  config_dir: "/etc/bytefreezer-proxy"
  config_path: "/etc/bytefreezer-proxy/config.yaml"
  log_dir: "/var/log/bytefreezer-proxy"
  spool_dir: "/var/spool/bytefreezer-proxy"
  service_path: "/etc/systemd/system/bytefreezer-proxy.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-proxy" 

# Log rotation settings
logrotate:
  rotate_count: 7

# Application configuration
config:
  app:
    name: "bytefreezer-proxy"
    version: "0.0.2"

  logging:
    level: "info"
    encoding: "console"

  server:
    api_port: 8088

  # Plugin-based input configuration (populated from Control)
  inputs: []

  # Account-based configuration - proxy polls Control for all tenants + datasets
  # IMPORTANT: bearer_token is account-specific API key from Control (NOT system-wide service_api_key)
  account_id: "ejq73vgnw26p"
  # tenant_id: "customer-1"  # Optional: Only required if account_id is not set
  bearer_token: "-6O9pIT7fVrIr715CIwIUgZuBkY7lB5sRYHx"  # Account-specific API key from Control
  control_url: "http://192.168.86.103:8082"
  config_mode: "control-only"  # local-only | control-only

  # Configuration polling from Control
  config_polling:
    enabled: true
    interval_seconds: 60
    timeout_seconds: 30
    cache_directory: "/var/cache/bytefreezer-proxy"
    retry_on_error: true

  receiver:
    base_url: "http://192.168.86.102:8082/{tenantid}/{datasetid}"
    timeout_seconds: 30
    upload_worker_count: 5    # Number of upload workers (aligned with receiver)
    max_idle_conns: 10        # HTTP connection pool size
    max_conns_per_host: 6     # Max connections per host

    # Dedicated retry HTTP client configuration (defaults to same values as upload client)
    # retry_max_idle_conns: 10      # HTTP connection pool size for retries (optional)
    # retry_max_conns_per_host: 6   # Max connections per host for retries (optional)

  # Batch processing configuration
  batching:
    enabled: true
    max_lines: 0          # Max lines per batch (0 = disabled)
    max_bytes: 10485760   # Max bytes per batch - 10MB (0 = disabled)
    timeout_seconds: 60
    compression_enabled: true
    compression_level: 6

  # SOC alerting configuration
  soc:
    enabled: false
    endpoint: ""
    timeout_seconds: 30

  # OpenTelemetry configuration (disabled by default)
  otel:
    enabled: false
    service_name: "bytefreezer-proxy"
    scrapeIntervalseconds: 15

  # Housekeeping configuration
  housekeeping:
    enabled: true
    intervalseconds: 60

  # Local spooling for failed uploads
  spooling:
    enabled: true
    directory: "{{ paths.spool_dir }}"
    max_size_bytes: 1073741824  # 1GB
    retry_attempts: 5
    retry_interval_seconds: 60  # 1 minute
    cleanup_interval_seconds: 300  # 5 minutes
    keep_src: false

  # Health reporting configuration for service registration and monitoring
  health_reporting:
    enabled: true
    report_interval: 30  # seconds
    timeout_seconds: 10
    register_on_startup: true

  # Tenant validation configuration (Layer 4 optimization - proactive tenant status checking)
  tenant_validation:
    enabled: true
    cache_ttl_seconds: 300  # 5 minutes for active tenants
    inactive_cache_ttl_seconds: 3600  # 1 hour for inactive tenants (reduces API load)
    timeout_seconds: 5

  # Development mode
  dev: false

# Download configuration for install.yml
download:
  url: "https://github.com/{{ github_repo }}/releases/{{ 'latest/download' if version == 'latest' else 'download/' + version }}/bytefreezer-proxy-linux-amd64.tar.gz"

# Docker image configuration for docker_install.yml
docker:
  image_name: "ghcr.io/n0needt0/bytefreezer-proxy"
  tag: "{{ bytefreezer_proxy_version | default('latest') }}"
  force_pull: false  # Set to true to always pull latest image

# Remove configuration
remove:
  spooling_dir: "{{ bytefreezer_proxy_remove_spooling_dir | default(false) }}"

# AWX Survey Variables (Override via job template surveys)
force_reinstall: "{{ force_reinstall | default(false) }}"
skip_validation: "{{ skip_validation | default(false) }}"
enable_debug_logging: "{{ enable_debug_logging | default(false) }}"