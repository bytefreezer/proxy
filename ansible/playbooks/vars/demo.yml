---
# ByteFreezer Proxy - On-Premises Deployment (Self-Contained Variables)
# On-prem deployment on tp1 (192.168.86.101)
# This file contains ALL variables needed for on-prem deployment

# GitHub repository
github_repo: "bytefreezer/proxy"
version: "{{ bytefreezer_proxy_version | default('latest') }}"

# Service configuration
service:
  name: "bytefreezer-proxy"
  user: "root"
  group: "root"

# File paths
paths:
  binary_dir: "/usr/local/bin"
  binary_path: "/usr/local/bin/bytefreezer-proxy"
  config_dir: "/etc/bytefreezer-proxy"
  config_path: "/etc/bytefreezer-proxy/config.yaml"
  log_dir: "/var/log/bytefreezer-proxy"
  spool_dir: "/var/spool/bytefreezer-proxy"
  service_path: "/etc/systemd/system/bytefreezer-proxy.service"
  logrotate_path: "/etc/logrotate.d/bytefreezer-proxy"

# Log rotation settings
# Logs rotate when reaching 100MB OR daily, whichever comes first
# Total logs limited to ~1GB (rotate_count * size + current file)
logrotate:
  rotate_count: 7
  size: "100M"
  maxsize: "1G"

# Application configuration
config:
  app:
    name: "bytefreezer-proxy"

  logging:
    level: "info"
    encoding: "console"

  server:
    api_port: 8008

  # Plugin-based input configuration (populated from Control)
  inputs: []

  # Demo deployment configuration
  account_id: "3dzauc5dmov6"
  # bearer_token comes from AWX variable: bytefreezer_proxy_bearer_token
  control_url: "https://api.bytefreezer.com"
  config_mode: "control-only"

  # Configuration polling from Control
  config_polling:
    enabled: true
    interval_seconds: 60
    timeout_seconds: 30
    cache_directory: "/var/cache/bytefreezer-proxy"
    retry_on_error: true

  receiver:
    base_url: "https://receiver.bytefreezer.com"
    timeout_seconds: 30
    upload_worker_count: 5
    max_idle_conns: 10
    max_conns_per_host: 6

  # Batch processing configuration
  batching:
    enabled: true
    max_lines: 0
    max_bytes: 10485760
    timeout_seconds: 60
    compression_enabled: true
    compression_level: 6

  # SOC alerting configuration
  soc:
    enabled: false
    endpoint: ""
    timeout_seconds: 30

  # OpenTelemetry configuration (disabled by default)
  otel:
    enabled: false
    service_name: "bytefreezer-proxy"
    scrapeIntervalseconds: 15
    metrics_port: 9090

  # Housekeeping configuration
  housekeeping:
    enabled: true
    intervalseconds: 60

  # Local spooling for failed uploads
  spooling:
    enabled: true
    directory: "/var/spool/bytefreezer-proxy"
    max_size_bytes: 1073741824
    dlq_max_size_bytes: 10737418240  # 10GB
    retry_attempts: 5
    retry_interval_seconds: 60
    cleanup_interval_seconds: 300
    keep_src: false

  # Health reporting configuration
  health_reporting:
    enabled: true
    report_interval: 30
    timeout_seconds: 10
    register_on_startup: true

  # Tenant validation configuration
  tenant_validation:
    enabled: true
    cache_ttl_seconds: 300
    inactive_cache_ttl_seconds: 3600
    timeout_seconds: 5

  # Development mode
  dev: false

# Download configuration
download:
  url: "https://github.com/{{ github_repo }}/releases/{{ 'latest/download' if version == 'latest' else 'download/' + version }}/bytefreezer-proxy-linux-amd64.tar.gz"

# Docker image configuration
docker:
  image_name: "ghcr.io/bytefreezer/proxy"
  tag: "{{ bytefreezer_proxy_version | default('latest') }}"
  force_pull: false

# Remove configuration
remove:
  spooling_dir: "{{ bytefreezer_proxy_remove_spooling_dir | default(false) }}"

# AWX Survey Variables
skip_validation: "{{ skip_validation | default(false) }}"
enable_debug_logging: "{{ enable_debug_logging | default(false) }}"
