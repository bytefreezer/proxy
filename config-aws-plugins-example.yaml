app:
  name: bytefreezer-proxy
  version: 0.0.2

# Logging configuration
logging:
  level: info
  encoding: console

# API server configuration
server:
  api_port: 8088

# Plugin-based input configuration
inputs:
  # Kinesis plugin for streaming data
  - type: "kinesis"
    name: "kinesis-stream-consumer"
    config:
      stream_name: "bytefreezer-input-stream"
      region: "us-west-2"
      tenant_id: "customer-1"
      dataset_id: "kinesis-data"
      file_extension: "ndjson"  # Data format: "ndjson", "json", "raw", "csv"
      poll_interval_seconds: 5
      max_records: 100
      shard_iterator_type: "LATEST"  # LATEST, TRIM_HORIZON, AT_TIMESTAMP, etc.

  # SQS plugin for message queue processing
  - type: "sqs"
    name: "sqs-message-processor"
    config:
      queue_name: "bytefreezer-input-queue"
      # queue_url: "https://sqs.us-west-2.amazonaws.com/123456789012/bytefreezer-input-queue"  # Optional direct URL
      region: "us-west-2"
      tenant_id: "customer-2"
      dataset_id: "sqs-messages"
      file_extension: "json"
      poll_interval_seconds: 3
      max_messages: 10          # Max 10 (AWS limit)
      visibility_timeout_seconds: 30
      wait_time_seconds: 20     # Long polling (max 20)
      delete_after_process: true # Delete messages after successful processing
      worker_count: 3           # Concurrent workers

  # UDP plugin for comparison (existing)
  - type: "udp"
    name: "udp-syslog-listener"
    config:
      host: "0.0.0.0"
      port: 2056
      dataset_id: "syslog-data"
      protocol: "udp"
      file_extension: "raw"
      read_buffer_size: 65536
      worker_count: 4

# Global tenant configuration (used as fallback for plugins)
tenant_id: "default-tenant"
bearer_token: "your-bearer-token-here"

# Bytefreezer-receiver configuration
receiver:
  base_url: "http://localhost:8082/{tenantid}/{datasetid}"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

# Batch processing configuration
batching:
  enabled: true
  max_lines: 0          # Max lines per batch (0 = disabled)
  max_bytes: 10485760   # Max bytes per batch - 10MB
  timeout_seconds: 30   # 30 second timeout
  compression_enabled: true
  compression_level: 6

# SOC alerting configuration
soc:
  enabled: false
  endpoint: ""
  timeout: 30

# OpenTelemetry configuration
otel:
  enabled: false
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 300  # 5 minutes

# Local spooling for failed uploads
spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 5368709120  # 5GB
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300

# Development mode
dev: false