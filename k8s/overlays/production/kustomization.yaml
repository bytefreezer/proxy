apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

metadata:
  name: bytefreezer-proxy-prod
  namespace: bytefreezer

bases:
  - ../../base

namespace: bytefreezer

commonLabels:
  environment: production
  app.kubernetes.io/instance: bytefreezer-proxy-prod

images:
  - name: ghcr.io/n0needt0/bytefreezer-proxy
    newTag: v1.0.0  # Use specific version for production

patches:
  - patch: |-
      - op: replace
        path: /spec/replicas
        value: 2
    target:
      kind: Deployment
      name: bytefreezer-proxy
  - patch: |-
      - op: replace
        path: /spec/resources/limits/memory
        value: "1Gi"
      - op: replace
        path: /spec/resources/limits/cpu
        value: "500m"
      - op: replace
        path: /spec/resources/requests/memory
        value: "512Mi"
      - op: replace
        path: /spec/resources/requests/cpu
        value: "250m"
    target:
      kind: Deployment
      name: bytefreezer-proxy