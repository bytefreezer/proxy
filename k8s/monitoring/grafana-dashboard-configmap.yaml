apiVersion: v1
kind: ConfigMap
metadata:
  name: bytefreezer-proxy-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  bytefreezer-proxy.json: |
    {
      "dashboard": {
        "id": null,
        "title": "ByteFreezer Proxy Dashboard",
        "tags": ["bytefreezer", "proxy"],
        "style": "dark",
        "timezone": "browser",
        "panels": [
          {
            "id": 1,
            "title": "Request Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(bytefreezer_proxy_requests_total[5m])",
                "legendFormat": "{{instance}}"
              }
            ]
          },
          {
            "id": 2,
            "title": "UDP Packets Received",
            "type": "graph", 
            "targets": [
              {
                "expr": "rate(bytefreezer_proxy_udp_packets_total[5m])",
                "legendFormat": "{{port}}"
              }
            ]
          },
          {
            "id": 3,
            "title": "Error Rate",
            "type": "graph",
            "targets": [
              {
                "expr": "rate(bytefreezer_proxy_errors_total[5m])",
                "legendFormat": "{{type}}"
              }
            ]
          }
        ],
        "time": {
          "from": "now-1h",
          "to": "now"
        },
        "refresh": "5s"
      }
    }