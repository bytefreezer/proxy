apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: bytefreezer-proxy-metrics
  namespace: bytefreezer
  labels:
    app.kubernetes.io/name: bytefreezer-proxy
    app.kubernetes.io/component: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: bytefreezer-proxy
      app.kubernetes.io/component: proxy
  endpoints:
  - port: metrics
    path: /metrics
    interval: 15s
    scrapeTimeout: 10s
  namespaceSelector:
    matchNames:
    - bytefreezer