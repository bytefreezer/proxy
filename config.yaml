app:
  name: bytefreezer-proxy
  version: 1.0.0

# Logging configuration   
logging:
  level: info
  encoding: console

# API server configuration
server:
  api_port: 8080

# Plugin-based input configuration
# Supports UDP, Kafka, and NATS plugins
inputs:
  # UDP Plugin for raw data ingestion
  - type: "udp"
    name: "main-udp"
    config:
      host: "0.0.0.0"
      port: 2055
      tenant_id: "customer-1"
      dataset_id: "logs"
      protocol: "udp"
      read_buffer_size: 65536
      worker_count: 4
      channel_buffer_size: 10000

# Backward compatibility: legacy UDP system (if no inputs configured)
udp:
  enabled: false  # Disabled when using plugin system

# Global tenant configuration (used as fallback)
tenant_id: "customer-1"
bearer_token: "bearer-token-customer-1-dev"

# Bytefreezer-receiver configuration
receiver:
  base_url: "http://localhost:8081/data/{tenantid}/{datasetid}"
  timeout_seconds: 30
  retry_count: 3
  retry_delay_seconds: 1

# Batch processing configuration
batching:
  enabled: true
  max_lines: 1000
  max_bytes: 1048576  # 1MB
  timeout_seconds: 30
  compression_enabled: true
  compression_level: 6

# SOC alerting configuration
soc:
  enabled: false
  endpoint: ""
  timeout: 30

# OpenTelemetry configuration (disabled by default)
otel:
  enabled: false
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 60

# Local spooling for failed uploads
spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 1073741824  # 1GB
  retry_attempts: 5
  retry_interval_seconds: 60  # 1 minute
  cleanup_interval_seconds: 300  # 5 minutes

# Development mode
dev: false