# ByteFreezer Proxy Configuration — Docker-ready defaults
#
# This config ships inside the Docker image. Secrets (account_id, bearer_token,
# control_url) are empty and MUST be supplied via environment variables or a
# volume-mounted config file override.
#
# IMPORTANT: Kernel Tuning for High-Volume UDP
# =============================================
# For reliable UDP ingestion at high rates, configure these kernel parameters:
#
#   sudo sysctl -w net.core.rmem_max=16777216
#   sudo sysctl -w net.core.rmem_default=8388608
#   sudo sysctl -w net.core.netdev_max_backlog=50000
#
# To make permanent, add to /etc/sysctl.conf and run: sudo sysctl -p

app:
  name: bytefreezer-proxy
  version: 1.0.0

logging:
  level: info
  encoding: console

server:
  api_port: 8008

# Plugin-based input configuration (populated from Control)
inputs: []

# Account-based configuration — proxy polls Control for all tenants + datasets
account_id: ""
bearer_token: ""
control_url: ""
config_mode: "control-only"

# Configuration polling from Control
config_polling:
  enabled: true
  interval_seconds: 30
  timeout_seconds: 10
  cache_directory: "/var/cache/bytefreezer-proxy"
  retry_on_error: true

# Receiver configuration (Docker service name default)
receiver:
  base_url: "http://receiver:8080"
  timeout_seconds: 30
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

# Batch processing configuration
batching:
  enabled: true
  max_lines: 10000
  max_bytes: 10485760   # 10MB
  timeout_seconds: 30
  compression_enabled: true
  compression_level: 6

# SOC alerting configuration
soc:
  enabled: false
  endpoint: ""
  timeout_seconds: 30

# OpenTelemetry configuration
otel:
  enabled: false
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15
  metrics_port: 9090

# Local spooling for failed uploads
spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 1073741824       # 1GB
  dlq_max_size_bytes: 10737418240  # 10GB
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300
  keep_src: false

dev: false

# Health reporting to control plane
health_reporting:
  enabled: true
  report_interval: 30
  timeout_seconds: 10
  register_on_startup: true

# Tenant validation (proactive status checking)
tenant_validation:
  enabled: true
  cache_ttl_seconds: 300
  inactive_cache_ttl_seconds: 3600
  timeout_seconds: 5

# Error tracking
error_tracking:
  enabled: true
