app:
  name: bytefreezer-proxy
  version: 0.0.2

# Logging configuration   
logging:
  level: info
  encoding: console

# API server configuration
server:
  api_port: 8088

# NEW: Plugin-based input configuration
# This replaces the old UDP listeners section
inputs:
  # UDP Plugin (equivalent to old UDP listener functionality)
  - type: "udp"
    name: "syslog-udp-listener"
    config:
      host: "0.0.0.0"
      port: 2056
      tenant_id: "customer-1"
      dataset_id: "syslog-data"
      bearer_token: "bearer-token-customer-1-dev"  # Optional: overrides global
      protocol: "syslog"
      syslog_mode: "rfc3164"
      read_buffer_size: 65536
      worker_count: 4

  # Another UDP Plugin for different data
  - type: "udp"
    name: "app-logs-udp"
    config:
      host: "0.0.0.0"
      port: 2057
      tenant_id: "customer-1"
      dataset_id: "application-logs"
      protocol: "udp"

  # Kafka Plugin (NEW!)
  - type: "kafka"
    name: "metrics-kafka-consumer"
    config:
      brokers: ["kafka1:9092", "kafka2:9092", "kafka3:9092"]
      topics: ["app-metrics", "system-metrics"]
      group_id: "bytefreezer-proxy-metrics"
      tenant_id: "customer-1"
      dataset_id: "kafka-metrics"
      auto_offset_reset: "latest"
      session_timeout: 30
      heartbeat_interval: 10

  # NATS Plugin (NEW!)
  - type: "nats"
    name: "events-nats-subscriber"
    config:
      servers: ["nats://nats1:4222", "nats://nats2:4222"]
      subjects: ["events.>", "alerts.>"]
      queue_group: "bytefreezer-processors"
      tenant_id: "customer-1"
      dataset_id: "nats-events"
      max_reconnect: -1  # Unlimited reconnects
      reconnect_wait: 2

# LEGACY: Old UDP configuration (deprecated, but still supported)
# If no 'inputs' are defined, this will be used for backward compatibility
udp:
  enabled: false  # Disabled since we're using the plugin system

# Global tenant configuration (fallback for plugins that don't specify)
tenant_id: "customer-1"
bearer_token: "bearer-token-customer-1-dev"

# Bytefreezer-receiver configuration
receiver:
  base_url: "http://localhost:8080/data/{tenantid}/{datasetid}"
  timeout_seconds: 30
  retry_count: 3
  retry_delay_seconds: 1

# SOC alerting configuration
soc:
  enabled: false
  endpoint: ""
  timeout: 30

# OpenTelemetry configuration
otel:
  enabled: true
  service_name: "bytefreezer-proxy"
  scrapeIntervalseconds: 15
  prometheus_mode: true
  metrics_port: 9090
  metrics_host: "0.0.0.0"

# Housekeeping configuration
housekeeping:
  enabled: true
  intervalseconds: 60

# Local spooling for failed uploads
spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 1073741824  # 1GB
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300

# Development mode
dev: false