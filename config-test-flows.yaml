app:
  name: "bytefreezer-proxy"
  version: "1.0.0"

logging:
  level: "debug"
  encoding: "json"

server:
  api_port: 8080

tenant_id: "test-tenant"
bearer_token: "test-token-123"

inputs:
  # sFlow plugin test
  - type: "sflow"
    name: "sflow-udp-listener"
    config:
      host: "0.0.0.0"
      port: 2066
      dataset_id: "sflow-data"
      protocol: "sflow"
      data_hint: "ndjson"                # Sflow data converts to ndjson
      read_buffer_size: 65536
      worker_count: 4

  # IPFIX plugin test
  - type: "ipfix"
    name: "ipfix-udp-listener"
    config:
      host: "0.0.0.0"
      port: 2067
      dataset_id: "ipfix-data"
      protocol: "ipfix"
      data_hint: "ndjson"
      read_buffer_size: 65536
      worker_count: 4

  # NetFlow plugin test
  - type: "netflow"
    name: "netflow-udp-listener"
    config:
      host: "0.0.0.0"
      port: 2068
      dataset_id: "netflow-data"
      protocol: "netflow"
      data_hint: "ndjson"
      read_buffer_size: 65536
      worker_count: 4

batching:
  enabled: true
  max_lines: 1000
  max_bytes: 1048576
  timeout_seconds: 30
  compression_enabled: true
  compression_level: 6

receiver:
  base_url: "http://localhost:8081"
  timeout_seconds: 30
  retry_count: 0
  retry_delay_seconds: 5
  upload_worker_count: 5
  max_idle_conns: 10
  max_conns_per_host: 6

spooling:
  enabled: true
  directory: "/var/spool/bytefreezer-proxy"
  max_size_bytes: 1073741824
  retry_attempts: 5
  retry_interval_seconds: 60
  cleanup_interval_seconds: 300
  keep_src: false
  queue_processing_interval_seconds: 30
  organization: "tenant_dataset"
  per_tenant_limits: false
  max_files_per_dataset: 0
  max_age_days: 0

soc:
  enabled: false
  endpoint: ""
  timeout: 5

otel:
  enabled: false
